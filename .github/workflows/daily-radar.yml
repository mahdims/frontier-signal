name: Daily Frontier Signal radar

on:
  schedule:
    # 11:30 UTC during PDT and 12:30 UTC during PST. This stays at least
    # 90 minutes beyond DeepSeek's 06:00-10:00 UTC peak-pricing window.
    - cron: "30 4 * * *"
      timezone: "America/Vancouver"
  workflow_dispatch:
    inputs:
      delivery_only:
        description: Restore saved results and resend without collecting or calling DeepSeek
        required: false
        default: false
        type: boolean
      include_reported:
        description: Intentionally allow items that appeared in earlier reports
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-frontier-signal-radar
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-email-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      DATABASE_URL: sqlite:///frontier_signal.db
      TZ: America/Vancouver

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Validate email configuration
        shell: bash
        env:
          REPORT_EMAIL_TO: ${{ vars.REPORT_EMAIL_TO }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          [[ -n "$REPORT_EMAIL_TO" ]] || { echo "Repository variable REPORT_EMAIL_TO is missing" >&2; exit 1; }
          [[ -n "$GMAIL_USERNAME" ]] || { echo "Secret GMAIL_USERNAME is missing" >&2; exit 1; }
          [[ -n "$GMAIL_APP_PASSWORD" ]] || { echo "Secret GMAIL_APP_PASSWORD is missing" >&2; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Restore pipeline history
        uses: actions/cache/restore@v4
        with:
          path: frontier_signal.db
          key: frontier-signal-db-${{ github.run_id }}
          restore-keys: |
            frontier-signal-db-

      - name: Install Frontier Signal
        run: python -m pip install .

      - name: Run collection, analysis, and reporting
        if: ${{ !inputs.delivery_only }}
        run: |
          extra_args=()
          if [[ "${{ inputs.include_reported }}" == "true" ]]; then
            extra_args+=(--include-reported)
          fi
          frontier-signal run-daily "${extra_args[@]}"

      - name: Regenerate report from saved results
        if: ${{ inputs.delivery_only }}
        run: |
          test -s frontier_signal.db || { echo "No cached database was restored" >&2; exit 1; }
          extra_args=()
          if [[ "${{ inputs.include_reported }}" == "true" ]]; then
            extra_args+=(--include-reported)
          fi
          frontier-signal report --hours 168 "${extra_args[@]}"

      - name: Locate today's report
        id: report
        shell: bash
        run: |
          test -s outputs/daily/latest.json || { echo "No report metadata was generated" >&2; exit 1; }
          report_path="$(python -c 'import json; print(json.load(open("outputs/daily/latest.json"))["path"])')"
          report_id="$(python -c 'import json; print(json.load(open("outputs/daily/latest.json"))["report_id"])')"
          echo "path=$report_path" >> "$GITHUB_OUTPUT"
          echo "id=$report_id" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Upload the daily report and database
        uses: actions/upload-artifact@v4
        with:
          name: frontier-signal-radar-${{ steps.report.outputs.date }}
          path: |
            ${{ steps.report.outputs.path }}
            frontier_signal.db
          if-no-files-found: error
          retention-days: 30

      - name: Save pending delivery state
        uses: actions/cache/save@v4
        with:
          path: frontier_signal.db
          key: frontier-signal-db-${{ github.run_id }}-pending

      - name: Email the radar through Gmail
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: Frontier Signal daily radar — ${{ steps.report.outputs.date }}
          to: ${{ vars.REPORT_EMAIL_TO }}
          from: Frontier Signal <${{ secrets.GMAIL_USERNAME }}>
          html_body: file://${{ steps.report.outputs.path }}
          convert_markdown: true
          attachments: ${{ steps.report.outputs.path }}

      - name: Mark report delivered
        run: frontier-signal mark-report-delivered "${{ steps.report.outputs.id }}"

      - name: Save delivered state
        uses: actions/cache/save@v4
        with:
          path: frontier_signal.db
          key: frontier-signal-db-${{ github.run_id }}-delivered
