# China-focused media registry. Automated sources are enabled only after a live probe.
# Manual entries remain discoverable in `frontier-signal sources` without entering the
# nightly collection loop.

ai_keywords_zh: &ai_keywords_zh
  ["AI", "人工智能", "大模型", "智能体", "机器人", "机器学习", "深度学习", "算力", "芯片", "模型", "DeepSeek", "Qwen"]
ai_keywords_en: &ai_keywords_en
  ["AI", "artificial intelligence", "machine learning", "LLM", "foundation model", "robot", "semiconductor", "DeepSeek", "Qwen", "China tech"]

